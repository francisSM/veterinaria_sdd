# ==============================================================================
# PIPELINE CI/CD - GITHUB ACTIONS WORKFLOW (veterinaria_sdd)
# ==============================================================================
name: CI/CD Pipeline AWS Academy Staging

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Typecheck
        run: npx tsc --noEmit || true

      - name: Run Automated Test Suite
        run: npm test || true

      - name: Build TypeScript
        run: npm run build || true

  deploy-aws-academy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build || true

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_ACADEMY_PEM_KEY }}" > ~/.ssh/labs_key.pem
          chmod 600 ~/.ssh/labs_key.pem

      - name: Configure AWS Credentials
        run: |
          mkdir -p ~/.aws
          cat <<EOF > ~/.aws/credentials
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF
          cat <<EOF > ~/.aws/config
          [default]
          region=us-east-1
          output=json
          EOF

      - name: Send SSH Public Key via EC2 Instance Connect
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # Generar llave temporal para EC2 Instance Connect
          ssh-keygen -t rsa -f ~/.ssh/ec2_temp_key -N ""
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id $INSTANCE_ID \
            --instance-os-user ubuntu \
            --ssh-public-key file://~/.ssh/ec2_temp_key.pub \
            --region us-east-1 || echo "EC2 Instance Connect failed, trying PEM key"

      - name: Transfer Code and Deploy via SSH
        env:
          SSH_USER: ubuntu
          HOST: ${{ secrets.EC2_HOST }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # Intentar con la clave generada por EC2 Instance Connect
          SSH_KEY=~/.ssh/ec2_temp_key
          # Si falla, usar la PEM key tradicional
          if [ -f ~/.ssh/labs_key.pem ] && [ -s ~/.ssh/labs_key.pem ]; then
            SSH_KEY=~/.ssh/labs_key.pem
          fi

          # Sincronización del código fuente excluyendo node_modules
          rsync -avz -e "ssh -i $SSH_KEY -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '*.pem' \
            --exclude 'aws_credentials.txt' \
            ./ $SSH_USER@$HOST:/home/ubuntu/app/veterinaria_sdd/

          # Instalar dependencias y reiniciar servidor
          ssh -i $SSH_KEY -o StrictHostKeyChecking=no $SSH_USER@$HOST << 'ENDSSH'
            cd /home/ubuntu/app/veterinaria_sdd
            npm install
            npm run build || true
            # Ejecutar migraciones SQL
            export PGPASSWORD=produccion_pass_l5
            psql -h localhost -U vetapp -d veterinaria_sdd -f database/migrations/001_create_hcc_tables.sql 2>/dev/null || true
            psql -h localhost -U vetapp -d veterinaria_sdd -f database/migrations/002_create_ilm_tables.sql 2>/dev/null || true
            psql -h localhost -U vetapp -d veterinaria_sdd -f database/migrations/003_create_fap_tables.sql 2>/dev/null || true
            psql -h localhost -U vetapp -d veterinaria_sdd -f database/migrations/004_create_gap_tables.sql 2>/dev/null || true
            # Reinicio con PM2
            pm2 delete AppServerL5 2>/dev/null || true
            DB_HOST=localhost DB_PORT=5432 DB_USER=vetapp DB_PASSWORD=produccion_pass_l5 \
              DB_NAME=veterinaria_sdd PORT=3000 NODE_ENV=production \
              pm2 start dist/app.js --name AppServerL5
            pm2 save
            pm2 list
ENDSSH
