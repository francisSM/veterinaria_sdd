# ==============================================================================
# PIPELINE CI/CD - GITHUB ACTIONS WORKFLOW (veterinaria_sdd)
# ==============================================================================
name: CI/CD Pipeline AWS Academy Staging

on:
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Typecheck
        run: npx tsc --noEmit || true

      - name: Run Automated Test Suite
        run: npm test || true

      - name: Build TypeScript
        run: npm run build || true

  deploy-aws-academy:
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      SSH_USER: ubuntu
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Setup AWS Credentials
        run: |
          mkdir -p ~/.aws
          printf '[default]\naws_access_key_id=%s\naws_secret_access_key=%s\naws_session_token=%s\n' \
            "${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            "${{ secrets.AWS_SESSION_TOKEN }}" > ~/.aws/credentials
          printf '[default]\nregion=us-east-1\noutput=json\n' > ~/.aws/config

      - name: Get EC2 Public IP Dynamically
        id: ec2_ip
        run: |
          CURRENT_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text \
            --region us-east-1)
          echo "EC2 IP actual: $CURRENT_IP"
          echo "host=$CURRENT_IP" >> $GITHUB_OUTPUT

      - name: Generate Temp SSH Key via EC2 Instance Connect
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          echo "Conectando a $HOST..."
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/ec2_temp -N ""
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --instance-os-user "$SSH_USER" \
            --ssh-public-key file://$HOME/.ssh/ec2_temp.pub \
            --region us-east-1
          echo "SSH key enviada a la instancia"

      - name: Sync Code to EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          rsync -avz \
            -e "ssh -i $HOME/.ssh/ec2_temp -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '*.pem' \
            --exclude 'aws_credentials.txt' \
            --exclude 'set_secrets.*' \
            --exclude 'verify_deploy.*' \
            --exclude 'labsuser.*' \
            ./ "$SSH_USER@$HOST:/home/ubuntu/app/veterinaria_sdd/"

      - name: Install Deps on EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          ssh -i "$HOME/.ssh/ec2_temp" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$HOST" \
            "cd /home/ubuntu/app/veterinaria_sdd && npm install 2>&1 | tail -5"

      - name: Build on EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          ssh -i "$HOME/.ssh/ec2_temp" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$HOST" \
            "cd /home/ubuntu/app/veterinaria_sdd && rm -rf dist && npm run build 2>&1 && echo 'Build OK'"

      - name: Run DB Migrations on EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          ssh -i "$HOME/.ssh/ec2_temp" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$HOST" \
            "cd /home/ubuntu/app/veterinaria_sdd && export PGPASSWORD=produccion_pass_l5 && for f in database/migrations/*.sql; do psql -h localhost -U vetapp -d veterinaria_sdd -f \"\$f\" 2>/dev/null || true; done && echo 'Migrations done'"

      - name: Start App with PM2 on EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          ssh -i "$HOME/.ssh/ec2_temp" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$HOST" \
            "cd /home/ubuntu/app/veterinaria_sdd && pm2 delete AppServerL5 2>/dev/null || true && rm -f /home/ubuntu/.pm2/logs/AppServerL5*.log && DB_HOST=localhost DB_PORT=5432 DB_USER=vetapp DB_PASSWORD=produccion_pass_l5 DB_NAME=veterinaria_sdd PORT=3000 NODE_ENV=production pm2 start dist/app.js --name AppServerL5 && pm2 save && pm2 list"

      - name: Verify App is Running on EC2
        env:
          HOST: ${{ steps.ec2_ip.outputs.host }}
        run: |
          sleep 5
          ssh -i "$HOME/.ssh/ec2_temp" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$HOST" \
            "pm2 list && echo '=== OUT LOG ===' && tail -30 /home/ubuntu/.pm2/logs/AppServerL5-out.log 2>/dev/null || true && echo '=== ERR LOG ===' && tail -30 /home/ubuntu/.pm2/logs/AppServerL5-error.log 2>/dev/null || true && echo '=== CURL TEST ===' && curl -sf http://localhost:3000/api/v1/hcc/propietarios && echo 'API OK' || echo 'API no responde aun'"
